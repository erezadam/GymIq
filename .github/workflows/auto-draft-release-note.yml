name: Auto-draft release note

# Required GitHub Secrets:
#   ANTHROPIC_API_KEY, ADMIN_EMAIL, ADMIN_PASSWORD, VITE_FIREBASE_* (×6)
#
# ADMIN_EMAIL / ADMIN_PASSWORD were renamed from E2E_ADMIN_EMAIL /
# E2E_ADMIN_PASSWORD when Playwright was removed. The E2E_ prefix was
# historical and misleading — these are plain admin Firebase login creds and
# were never tied to any test framework.

on:
  workflow_run:
    workflows: ["Deploy to Firebase"]
    types: [completed]

jobs:
  draft:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Resolve PR for deployed commit
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          number=$(gh pr list \
            --state merged \
            --search "${{ github.event.workflow_run.head_sha }}" \
            --json number \
            -q '.[0].number')
          if [ -z "$number" ]; then
            echo "No merged PR found for ${{ github.event.workflow_run.head_sha }} — skipping draft."
          fi
          echo "number=$number" >> "$GITHUB_OUTPUT"

      - name: Generate draft from PR
        if: steps.pr.outputs.number != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: npm run draft:release-note -- --pr ${{ steps.pr.outputs.number }}
